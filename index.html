const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imh1aGlqb2Z0cGdpeml4d3Rqd3BrIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NDkzODg5NDgsImV4cCI6MjA2NDk2NDk0OH0.fWH8stLIPQ3RGjPomWUNtM3Dq_q5HsVz1ZHrFDjIgts';   // вЖР Supabase anon key buraya

const EDGE_FUNCTION_URL = 'https://huhijoftpgizixwtjwpk.supabase.co/functions/v1/bright-handler';

let supabaseClient = null;
let USE_SUPABASE = true; // Supabase bilgilerini girdikten sonra true yapƒ±n

// Edge Function √Љzerinden baƒЯlantƒ±
if (EDGE_FUNCTION_URL && !EDGE_FUNCTION_URL.includes('XXXXX')) {
  USE_SUPABASE = true;
  console.log('вЬЕ Supabase baƒЯlantƒ±sƒ± aktif');
} else {
  console.log('вЪ†пЄП Edge Function URL girilmedi');

// ============================================
// SUPABASE VERƒ∞ FONKSƒ∞YONLARI

// T√Љm m√Љ≈Яterileri √Іek
async function fetchCustomers() {
  if (!USE_SUPABASE) return null;
  const { data, error } = await supabaseClient
    .from('customers')
    .select('*, sales_rep:users!sales_rep_id(name), ops_user:users!ops_id(name)')
    .order('created_at', { ascending: false });
  if (error) { console.error('fetchCustomers:', error); return null; }
  return data;
}

// M√Љ≈Яteri g√Љncelle (status, √ґdeme vs.)
async function updateCustomer(id, updates) {
  if (!USE_SUPABASE) return null;
  const { data, error } = await supabaseClient
    .from('customers')
    .update(updates)
    .eq('id', id)
    .select();
  if (error) { console.error('updateCustomer:', error); return null; }
  return data;
}

// Yeni m√Љ≈Яteri ekle
async function insertCustomer(customer) {
  if (!USE_SUPABASE) return null;
  const { data, error } = await supabaseClient
    .from('customers')
    .insert([customer])
    .select();
  if (error) { console.error('insertCustomer:', error); return null; }
  return data;
}

// Not ekle
async function insertNote(customerId, content, authorName) {
  if (!USE_SUPABASE) return null;
  const { data, error } = await supabaseClient
    .from('notes')
    .insert([{ customer_id: customerId, content, author_name: authorName }]);
  if (error) { console.error('insertNote:', error); return null; }
  return data;
}

// Arama kaydƒ± ekle
async function insertCallLog(customerId, result, note, callerName) {
  if (!USE_SUPABASE) return null;
  const { data, error } = await supabaseClient
    .from('call_logs')
    .insert([{ customer_id: customerId, result, note, caller_name: callerName }]);
  if (error) { console.error('insertCallLog:', error); return null; }
  return data;
}

// Status ge√Іmi≈Яi ekle
async function insertStatusHistory(customerId, fromStatus, toStatus, changedByName) {
  if (!USE_SUPABASE) return null;
  const { data, error } = await supabaseClient
    .from('status_history')
    .insert([{ customer_id: customerId, from_status: fromStatus, to_status: toStatus }]);
  if (error) { console.error('insertStatusHistory:', error); return null; }
  return data;
}

// Kullanƒ±cƒ± giri≈Яi - Edge Function √Љzerinden
async function signInUser(username, password) {
  try {
    const res = await fetch(EDGE_FUNCTION_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ action: 'login', username, password })
    });
    const data = await res.json();
    if (!res.ok || data.error) return null;
    return data;  // { user, token }
  } catch(e) {
    console.error('Edge Function login hatasƒ±:', e);
    return null;
  }
}

// ≈Юifre g√Љncelle
async function updatePassword(userId, newPassword) {
  if (!USE_SUPABASE) return false;
  const { error } = await supabaseClient
    .from('users')
    .update({ password_hash: newPassword })
    .eq('id', userId);
  return !error;
}

// Kullanƒ±cƒ± adƒ± g√Љncelle
async function updateUsername(userId, newUsername) {
  if (!USE_SUPABASE) return false;
  const { error } = await supabaseClient
    .from('users')
    .update({ username: newUsername })
    .eq('id', userId);
  return !error;
}

// Ad g√Љncelle
async function updateDisplayName(userId, newName) {
  if (!USE_SUPABASE) return false;
  const { error } = await supabaseClient
    .from('users')
    .update({ name: newName, rep_name: newName })
    .eq('id', userId);
  return !error;
}

// Ger√Іek zamanlƒ± m√Љ≈Яteri g√Љncellemeleri dinle
function subscribeToCustomers(callback) {
  if (!USE_SUPABASE) return;
  supabaseClient
    .channel('customers')
    .on('postgres_changes', { event: '*', schema: 'public', table: 'customers' }, callback)
    .subscribe();
}
</script>

// вЪ†пЄП SENKRONƒ∞ZASYON UYARISI: Bu dosyadaki durum (status) listeleri (SCLS, PRESALE_STAGES,
// WARN_EVRAK_S, WARN_RANDEVU_S, CONSULATE_WAIT_S, KSTAGES, KCOLS) bright-handler-v14.ts (backend,
// SALES_STAGES/EVRAK_STAGES/RANDEVU_STAGES) ve portal.html (STEPS) ile elle senkron tutuluyor.
// Yeni bir durum eklerken/√Іƒ±karƒ±rken/adƒ±nƒ± deƒЯi≈Яtirirken HER √Ь√З dosyayƒ± da g√Љncelleyin.
const SCLS={'Yeni Kayƒ±t':'b-lead','Sonra Ara':'b-callback','Ula≈Яƒ±lamƒ±yor':'b-unreachable','ƒ∞lgileniyor':'b-interested','ƒ∞lgilenmiyor':'b-notinterested','ƒ∞leti≈Яime Ge√Іildi':'b-contacted','√Цdeme Alƒ±ndƒ±':'b-payment','Belge Bekleniyor':'b-docs-pending','Belgeler Tamam':'b-docs-done','Randevu Aranƒ±yor':'b-appt-search','Randevu Alƒ±ndƒ±':'b-appt-sched','Randevu Evraklarƒ± Hazƒ±rlanƒ±yor':'b-docs-pending','Randevu Evraklarƒ± Tamamlandƒ±':'b-docs-done','Ba≈Яvuru Yapƒ±ldƒ±':'b-submitted','Sonu√І Bekleniyor':'b-waiting','Tamamlandƒ±':'b-completed','ƒ∞ptal':'b-cancelled'};
const MONTHS=['Oca','≈Юub','Mar','Nis','May','Haz','Tem','AƒЯu','Eyl','Eki','Kas','Ara'];
function repColorHash(name){if(!name||name==='вАФ')return'#2563EB';const cols=['#2563EB','#D97706','#059669','#DC2626','#0891B2','#7C3AED','#0D9488','#DB2777','#EA580C','#65A30D'];let h=0;for(let i=0;i<name.length;i++)h=name.charCodeAt(i)+((h<<5)-h);return cols[Math.abs(h)%cols.length];}

function esc(str){
  if(str===null||str===undefined)return '';
  return String(str).replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]));
}

function fmtDT(iso){
  if(!iso)return'вАФ';
  const d=new Date(iso);
  return d.getDate()+' '+MONTHS[d.getMonth()]+' '+d.getFullYear()+' '+String(d.getHours()).padStart(2,'0')+':'+String(d.getMinutes()).padStart(2,'0');
}

async function loadCustomers(){
  try{
    const res=await fetch(EDGE_FUNCTION_URL,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({action:'getCustomers',token:CU.token})});
    const data=await res.json();
    const rows=data.customers||[];
    customers=rows.map(r=>({
      id:r.file_number,name:esc(r.full_name),phone:esc(r.phone),email:esc(r.email),country:esc(r.country),

      status:r.status,fee:r.service_fee||0,prepay:r.prepayment||0,

      lastMod:fmtDT(r.last_modified_at),
      created:r.created_at||null,registrationDate:r.registration_date||'',lastModRaw:r.last_modified_at||null,
      apptDate:r.appt_date||'',apptTime:r.appt_time||'',apptCenter:r.appt_center||'',
      desiredApptDate:r.desired_appt_date||'',confirmedApptDate:r.confirmed_appt_date||'',

      tc:r.tc_kimlik||'',
      lastModBy:r.last_modified_by||'',
      paymentDate:r.payment_date||'',
      refundStatus:r.refund_status||'',refundAmount:r.refund_amount||0,refundReason:r.refund_reason||'',refundDate:r.refund_date||'',
      refundRequestedBy:r.refund_requested_by||'',refundRequestedAt:r.refund_requested_at||null,
      callTotal:r.call_total||0,callReached:r.call_reached||0,reminderDate:r.call_reminder_date||'',appTotal:r.app_total||0,appPending:r.app_pending||0,appPendingNoDate:r.app_pending_no_date||0,appPendingData:JSON.parse(r.app_pending_data||'[]'),visaResult:r.visa_result||'',visaStartDate:r.visa_start_date||'',visaEndDate:r.visa_end_date||''
    }));
    filtered=[...customers];
  }catch(e){
    console.error('loadCustomers hatasƒ±:',e);
    customers=[];filtered=[];
  }
}

function getTableData(){
  let data=[...filtered];
  if(tableColSearch){
    const sq=tableColSearch.toLowerCase();
    data=data.filter(c=>
      (c.name&&c.name.toLowerCase().includes(sq))||
      (c.id&&c.id.toLowerCase().includes(sq))||
      (c.phone&&c.phone.includes(sq))
    );
  }
  if(tableRepFilter) data=data.filter(c=>{
    const extra=getCurrentHandler(c);
    return c.rep===tableRepFilter || (extra && extra.name===tableRepFilter);
  });
  if(tableSort.col){
    const d=tableSort.dir==='asc'?1:-1;
    data.sort((a,b)=>{
      switch(tableSort.col){
        case 'name': return d*(a.name||'').localeCompare(b.name||'','tr');
        case 'payment': return d*(((a.fee||0)-(a.prepay||0))-(((b.fee||0)-(b.prepay||0))));
        case 'date': return d*((a.lastModRaw?new Date(a.lastModRaw).getTime():0)-(b.lastModRaw?new Date(b.lastModRaw).getTime():0));
        case 'calls': return d*((a.callTotal||0)-(b.callTotal||0));
        case 'appt': return d*((a.apptDate?new Date(a.apptDate).getTime():0)-(b.apptDate?new Date(b.apptDate).getTime():0));
        default: return 0;
      }
    });
  }
  return data;
}

function inDashPeriod(c,period){
  // Kayƒ±t tarihi (registration_date) varsa onu kullan, yoksa created_at'e d√Љ≈Я
  // G√Љncelleme tarihine bakma вАФ "Bu Ay" = bu ay kayƒ±t olan m√Љ≈Яteriler
  const effDate = c.registrationDate || c.created;
  if(period==='custom'){
    if(!effDate)return false;
    const d=new Date(effDate);
    if(dashDateFrom){const f=new Date(dashDateFrom);f.setHours(0,0,0,0);if(d<f)return false;}
    if(dashDateTo){const t=new Date(dashDateTo);t.setHours(23,59,59,999);if(d>t)return false;}
    return true;
  }
  if(period==='all')return true;
  if(!effDate)return false;
  const d=new Date(effDate),now=new Date();
  if(period==='today')return d.toDateString()===now.toDateString();
  if(period==='week'){
    const dow=now.getDay(); const diffToMon=dow===0?6:dow-1;
    const start=new Date(now); start.setDate(now.getDate()-diffToMon); start.setHours(0,0,0,0);
    return d>=start;
  }
  if(period==='month')return d.getFullYear()===now.getFullYear()&&d.getMonth()===now.getMonth();
  if(period==='quarter')return d.getFullYear()===now.getFullYear()&&Math.floor(d.getMonth()/3)===Math.floor(now.getMonth()/3);
  if(period==='year')return d.getFullYear()===now.getFullYear();
  if(/^\d{4}-\d{2}$/.test(period)){const[y,m]=period.split('-').map(Number);return d.getFullYear()===y&&d.getMonth()===m-1;}
  return true;
}

function avgSalesCycleDays(list){
  const done=list.filter(c=>c.status==='Tamamlandƒ±'&&c.created&&c.lastModRaw);
  if(!done.length)return null;
  const total=done.reduce((s,c)=>s+Math.max(0,(new Date(c.lastModRaw).getTime()-new Date(c.created).getTime())/86400000),0);
  return {avg:Math.round(total/done.length),count:done.length};
}

  warnings.sort((a,b)=>{
    if(a.level!==b.level) return a.level==='crit'?-1:1;

function funnelHTML(list){
  const nonCancelled=list.filter(c=>c.status!=='ƒ∞ptal');
  const counts=FUNNEL_STAGES.map(stage=>{
    const idx=STAGES.indexOf(stage);
    return nonCancelled.filter(c=>STAGES.indexOf(c.status)>=idx).length;
  });
  const top=counts[0]||0;
  const cancelledCount=list.filter(c=>c.status==='ƒ∞ptal').length;
  if(!list.length)return `<div class="chart-card"><div class="chart-title">D√ґn√Љ≈Я√Љm Hunisi</div><div style="font-size:12px;color:var(--text3);padding:8px 0">Hen√Љz veri yok</div></div>`;
  return `<div class="chart-card" style="margin-bottom:20px">
    <div class="chart-title">D√ґn√Љ≈Я√Љm Hunisi <span style="font-weight:400;color:var(--text3);font-size:11px">вАФ "Yeni Kayƒ±t"tan en az bu a≈Яamaya ula≈Яmƒ±≈Я m√Љ≈Яteri sayƒ±sƒ±</span></div>
    ${FUNNEL_STAGES.map((stage,i)=>{
      const c=counts[i],pct=top?Math.round(c/top*100):0,w=top?Math.max(10,pct):10;
      return `<div class="bar-row"><div class="bar-lbl" style="min-width:130px;text-align:left">${stage}</div><div class="bar-track"><div class="bar-fill" style="width:${w}%;background:${FUNNEL_COLORS[i]}"></div></div><div class="bar-val" style="min-width:70px">${c} (%${pct})</div></div>`;
    }).join('')}
    ${cancelledCount?`<div style="font-size:11px;color:var(--red);margin-top:6px">вЖ≥ ${cancelledCount} m√Љ≈Яteri s√Љre√І i√Іinde iptal oldu</div>`:''}
  </div>`;
}

function computeCustFiltered(){
  const sq=custSearchQuery.toLowerCase();
  return customers.filter(c=>{
    if(CONSULATE_WAIT_S.includes(c.status))return false;
    if(CU.role!=='management'&&c.status==='ƒ∞lgilenmiyor')return false;
    if(sq&&!((c.name&&c.name.toLowerCase().includes(sq))||(c.id&&c.id.toLowerCase().includes(sq))||(c.phone&&c.phone.includes(sq))))return false;
    if(custStatusFilter.length>0&&!custStatusFilter.includes(c.status))return false;
    if(custCountryFilter&&c.country!==custCountryFilter)return false;
    return true;
  });
}

let muhPeriod = 'month', muhDateFrom = '', muhDateTo = '';
const MUH_PERIODS = [['all','T√Љm Zamanlar'],['today','Bug√Љn'],['week','Bu Hafta'],['month','Bu Ay'],['quarter','Bu √Зeyrek'],['year','Bu Yƒ±l'],['custom','√Цzel Aralƒ±k'],['2026-01','Ocak 2026'],['2026-02','≈Юubat 2026'],['2026-03','Mart 2026'],['2026-04','Nisan 2026'],['2026-05','Mayƒ±s 2026'],['2026-06','Haziran 2026'],['2026-07','Temmuz 2026'],['2026-08','AƒЯustos 2026'],['2026-09','Eyl√Љl 2026'],['2026-10','Ekim 2026'],['2026-11','Kasƒ±m 2026'],['2026-12','Aralƒ±k 2026']];

function inMuhPeriod(dateStr, period) {
  if (!dateStr) return false;
  if (period === 'all') return true;
  const d = new Date(dateStr), now = new Date();
  if (period === 'custom') {
    if (muhDateFrom) { const f = new Date(muhDateFrom); f.setHours(0,0,0,0); if (d < f) return false; }
    if (muhDateTo) { const t = new Date(muhDateTo); t.setHours(23,59,59,999); if (d > t) return false; }
    return true;
  }
  if (period === 'today') return d.toDateString() === now.toDateString();
  if (period === 'week') {
    const dow = now.getDay(), diff = dow===0?6:dow-1;
    const start = new Date(now); start.setDate(now.getDate()-diff); start.setHours(0,0,0,0);
    return d >= start;
  }
  if (period === 'month') return d.getFullYear()===now.getFullYear() && d.getMonth()===now.getMonth();
  if (period === 'quarter') return d.getFullYear()===now.getFullYear() && Math.floor(d.getMonth()/3)===Math.floor(now.getMonth()/3);
  if (period === 'year') return d.getFullYear()===now.getFullYear();
  if (/^\d{4}-\d{2}$/.test(period)) { const [y,m]=period.split('-').map(Number); return d.getFullYear()===y && d.getMonth()===m-1; }
  return true;
}

function getMuhMonthKey(dateStr) {
  if (!dateStr) return null;
  return dateStr.slice(0,7); // YYYY-MM
}

function fmtMonthKey(key) {
  const MONTHS_TR = ['Ocak','≈Юubat','Mart','Nisan','Mayƒ±s','Haziran','Temmuz','AƒЯustos','Eyl√Љl','Ekim','Kasƒ±m','Aralƒ±k'];
  const [y, m] = key.split('-');
  return MONTHS_TR[parseInt(m)-1] + ' ' + y;
}


// вХРвХР TEK GELƒ∞R KAYNAƒЮI вХРвХР
// allPayments doluysa customer_payments tablosundan (her √ґdeme kendi tarihiyle)
// allPayments bo≈Яsa customers.prepay'den fallback (eski sistem)
// D√ґnen format: [{fileNo, name, country, rep, amount, date, fee, prepay}]
function getIncomeItems(period, repFilter, countryFilter) {
  // Hibrit yakla≈Яƒ±m:
  // - customer_payments'ta kaydƒ± olan m√Љ≈Яteri вЖТ oradan oku (doƒЯru tarihli)
  // - customer_payments'ta kaydƒ± olmayan m√Љ≈Яteri вЖТ customers.prepay'den oku (eski sistem)
  const trackedIds = new Set(allPayments.map(p => p.customer_file_number));
  const items = [];

  // YENƒ∞ Sƒ∞STEM: customer_payments'tan, d√ґnem filtresiyle
  allPayments.filter(p => inMuhPeriod(p.payment_date, period)).forEach(p => {
    const c = customers.find(x => x.id === p.customer_file_number);
    if (repFilter && (c?.rep||'вАФ') !== repFilter) return;
    if (countryFilter && (c?.country||'') !== countryFilter) return;
    items.push({
      paymentId: p.id || '',
      fileNo: p.customer_file_number,
      name: c?.name || 'вАФ',
      country: c?.country || 'вАФ',
      rep: c?.rep || 'вАФ',
      amount: Number(p.amount||0),
      date: p.payment_date || '',
      note: p.note || '',
      fee: c?.fee || 0,
      prepay: c?.prepay || 0,
      lastMod: c?.lastMod || '',
      lastModBy: c?.lastModBy || '',
    });
  });

  // ESKƒ∞ Sƒ∞STEM: customer_payments'ta kaydƒ± olmayan m√Љ≈Яteriler
  customers.filter(c =>
    !trackedIds.has(c.id) &&
    (c.prepay||0) > 0 &&
    inMuhPeriod(c.paymentDate || c.created, period) &&
    (!repFilter || c.rep === repFilter) &&
    (!countryFilter || c.country === countryFilter)
  ).forEach(c => {
    items.push({
      paymentId: '',
      fileNo: c.id,
      name: c.name,
      country: c.country || 'вАФ',
      rep: c.rep || 'вАФ',
      amount: c.prepay || 0,
      date: c.paymentDate || (c.created||'').slice(0,10) || '',
      note: '',
      fee: c.fee || 0,
      prepay: c.prepay || 0,
      lastMod: c.lastMod || '',
      lastModBy: c.lastModBy || '',
    });
  });

  return items;
}

function getMuhData(period) {
  // Hibrit: customer_payments'ta kayƒ±tlƒ± m√Љ≈Яteriler oradan, diƒЯerleri customers.prepay'den
  const items = getIncomeItems(period, '', '');
  const totalGelir = items.reduce((s,p)=>s+p.amount, 0);
  const uniqueCustCount = new Set(items.map(p=>p.fileNo)).size;

  const giderList = expenses.filter(e => inMuhPeriod(e.date, period));
  const totalGider = giderList.reduce((s,e)=>s+(e.amount||0), 0);
  // M√Љ≈Яteri bazlƒ± giderler: m√Љ≈Яterinin √ґdeme tarihi aya g√ґre d√ґnemle e≈Яle≈Яtir
  const custExpList = allCustExpenses.filter(function(e){
    const c = customers.find(function(x){return x.id===e.customer_file_number;});
    return c && inMuhPeriod(c.paymentDate||c.created, period);
  });
  const totalCustExp = custExpList.reduce((s,e)=>s+Number(e.amount||0), 0);
  const totalIade = customers.filter(c=>c.refundStatus==='Ger√Іekle≈Яti').reduce((s,c)=>s+(c.refundAmount||0),0);
  const bekleyenList = customers.filter(c=>(c.fee||0)>(c.prepay||0)&&c.status!=='ƒ∞ptal');
  const totalBekleyen = bekleyenList.reduce((s,c)=>s+((c.fee||0)-(c.prepay||0)),0);

  return { items, giderList, custExpList, totalGelir, totalGider, totalCustExp, totalIade, bekleyenList, totalBekleyen, uniqueCustCount };
}

function getMonthlyBreakdown() {
  const trackedIds = new Set(allPayments.map(p => p.customer_file_number));
  const monthMap = {};
  const custPerMonth = {}; // unique customer count per month

  // YENƒ∞ Sƒ∞STEM: customer_payments'tan
  allPayments.forEach(p => {
    const k = (p.payment_date||'').slice(0,7);
    if (!k) return;
    if (!monthMap[k]) monthMap[k] = {income:0,expense:0,count:0,refund:0};
    monthMap[k].income += Number(p.amount||0);
    if (!custPerMonth[k]) custPerMonth[k] = new Set();
    custPerMonth[k].add(p.customer_file_number);
  });

  // ESKƒ∞ Sƒ∞STEM: customer_payments'ta kaydƒ± olmayan m√Љ≈Яteriler
  customers.filter(c => !trackedIds.has(c.id) && (c.prepay||0)>0).forEach(c => {
    const k = getMuhMonthKey(c.paymentDate||c.created);
    if (!k) return;
    if (!monthMap[k]) monthMap[k] = {income:0,expense:0,count:0,refund:0};
    monthMap[k].income += c.prepay||0;
    if (!custPerMonth[k]) custPerMonth[k] = new Set();
    custPerMonth[k].add(c.id);
  });

  // M√Љ≈Яteri sayƒ±larƒ±nƒ± uygula
  Object.keys(custPerMonth).forEach(k => {
    if (monthMap[k]) monthMap[k].count = custPerMonth[k].size;
  });

  // Gider
  expenses.forEach(e => {
    const k = getMuhMonthKey(e.date);
    if (!k) return;
    if (!monthMap[k]) monthMap[k] = {income:0,expense:0,count:0,refund:0};
    monthMap[k].expense += e.amount||0;
  });

  // M√Љ≈Яteri bazlƒ± gider вАФ m√Љ≈Яterinin √ґdeme ayƒ±na yaz
  allCustExpenses.forEach(function(e) {
    const c = customers.find(function(x){ return x.id===e.customer_file_number; });
    const k = getMuhMonthKey(c ? (c.paymentDate||c.created) : '');
    if (!k) return;
    if (!monthMap[k]) monthMap[k] = {income:0,expense:0,count:0,refund:0};
    monthMap[k].expense += Number(e.amount||0);
  });

  // ƒ∞ade
  customers.filter(c=>c.refundStatus==='Ger√Іekle≈Яti').forEach(c => {
    const k = getMuhMonthKey(c.refundDate||c.paymentDate||c.created);
    if (!k) return;
    if (!monthMap[k]) monthMap[k] = {income:0,expense:0,count:0,refund:0};
    monthMap[k].refund += c.refundAmount||0;
  });

  return Object.entries(monthMap).sort((a,b)=>b[0].localeCompare(a[0]));
}

function getRepBreakdown(items) {
  const repMap = {};
  items.forEach(p=>{
    const k = p.rep||'вАФ';
    if (!repMap[k]) repMap[k] = {txnCount:0,income:0};
    repMap[k].txnCount++;
    repMap[k].income += Number(p.amount)||0;
  });
  return Object.entries(repMap).sort((a,b)=>b[1].income-a[1].income);
}

function getCountryBreakdown(items) {
  const cMap = {};
  items.forEach(p=>{
    const k = p.country||'Bilinmiyor';
    if (!cMap[k]) cMap[k] = {txnCount:0,income:0};
    cMap[k].txnCount++;
    cMap[k].income += Number(p.amount)||0;
  });
  return Object.entries(cMap).sort((a,b)=>b[1].income-a[1].income);
}

function exportMuhAylik() {
  const monthly = getMonthlyBreakdown();
  if (!monthly.length) { toast('Veri yok','red'); return; }
  const headers = ['Ay','Tahsilat (вВЇ)','Gider (вВЇ)','Net K√Ґr (вВЇ)','ƒ∞ade (вВЇ)','M√Љ≈Яteri Sayƒ±sƒ±'];
  const rows = monthly.map(([key,v]) => [fmtMonthKey(key), v.income, v.expense, v.income-v.expense, v.refund, v.count]);
  const totRow = ['TOPLAM',
    monthly.reduce((s,[,v])=>s+v.income,0),
    monthly.reduce((s,[,v])=>s+v.expense,0),
    monthly.reduce((s,[,v])=>s+(v.income-v.expense),0),
    monthly.reduce((s,[,v])=>s+v.refund,0),
    monthly.reduce((s,[,v])=>s+v.count,0)
  ];
  const ws = XLSX.utils.aoa_to_sheet([headers,...rows,totRow]);
  ws['!cols'] = [{wch:14},{wch:16},{wch:14},{wch:14},{wch:12},{wch:14}];
  const wb = XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb,ws,'Aylik Kiriim');
  XLSX.writeFile(wb,`muhasebe-aylik-${new Date().toISOString().slice(0,10)}.xlsx`);
  toast('вЬУ Aylƒ±k rapor indirildi','green');
}

  const rows = repData.map(([rep,v]) => [rep,v.txnCount,v.income,Math.round(v.income/v.txnCount)]);
  const ws = XLSX.utils.aoa_to_sheet([headers,...rows]);
  ws['!cols'] = [{wch:18},{wch:14},{wch:16},{wch:14},{wch:16},{wch:14}];

function exportMuhTamRapor() {

  const netKar = totalGelir - totalGider - totalCustExp;
  const monthly = getMonthlyBreakdown();
  const repData = getRepBreakdown(tamItems);
  const countryData = getCountryBreakdown(tamItems);
  const wb = XLSX.utils.book_new();
  const period = MUH_PERIODS.find(([v])=>v===muhPeriod)?.[1]||muhPeriod;

  // Sheet 1: Ozet
  const ozet = [
    ['VizeCRM Muhasebe Raporu - '+period],[''],
    ['Toplam Tahsilat (вВЇ)', totalGelir],
    ['Genel Giderler (вВЇ)', totalGider],
    ['M√Љ≈Яteri Giderleri (вВЇ)', totalCustExp],
    ['Net Kar/Zarar (вВЇ)', netKar],
    ['Bekleyen Tahsilat (вВЇ)', totalBekleyen],
    ['Toplam Iade (вВЇ)', totalIade],
    ['Odeme Alan Musteri', uniqueCustCount],
    ['Ort. Musteri Degeri (вВЇ)', uniqueCustCount?Math.round(totalGelir/uniqueCustCount):0],
    ['Rapor Tarihi', new Date().toLocaleDateString('tr-TR')],
  ];
  XLSX.utils.book_append_sheet(wb, XLSX.utils.aoa_to_sheet(ozet), 'Ozet');

  // Sheet 2: Aylik
  const aylikH = ['Ay','Tahsilat','Gider','Net','Iade','Musteri'];
  const aylikR = monthly.map(([k,v])=>[fmtMonthKey(k),v.income,v.expense,v.income-v.expense,v.refund,v.count]);
  XLSX.utils.book_append_sheet(wb, XLSX.utils.aoa_to_sheet([aylikH,...aylikR]), 'Aylik');

  // Sheet 3: Temsilci
  const repH = ['Temsilci','Islem Sayisi','Toplam Ciro','Islem Basi Ortalama'];
  const repR = repData.map(([r,v])=>[r,v.txnCount,v.income,Math.round(v.income/v.txnCount)]);
  XLSX.utils.book_append_sheet(wb, XLSX.utils.aoa_to_sheet([repH,...repR]), 'Temsilci');

  // Sheet 4: Ulke
  const cntH = ['Ulke','Islem Sayisi','Ciro','Ortalama'];
  const cntR = countryData.map(([c,v])=>[c,v.txnCount,v.income,Math.round(v.income/v.txnCount)]);
  XLSX.utils.book_append_sheet(wb, XLSX.utils.aoa_to_sheet([cntH,...cntR]), 'Ulke');

  // Sheet 5: Odemeler (tamItems'dan alƒ±nƒ±yor, yukarƒ±da tanƒ±mlƒ±)
  const tahH = ['Tarih','Dosya No','Musteri','Ulke','Temsilci','Tutar','Not'];
  const tahR = tamItems.sort((a,b)=>(b.date||'').localeCompare(a.date||'')).map(p=>[p.date,p.fileNo,p.name,p.country,p.rep,p.amount,p.note||'']);
  XLSX.utils.book_append_sheet(wb, XLSX.utils.aoa_to_sheet([tahH,...tahR]), 'Odemeler');

  // Sheet 7: Genel Gider
  const gdrH = ['Tarih','Kategori','Aciklama','Tutar','Kaydeden'];
  const gdrR = giderList.map(e=>[e.date,e.category,e.description||'',e.amount,e.created_by||'']);
  XLSX.utils.book_append_sheet(wb, XLSX.utils.aoa_to_sheet([gdrH,...gdrR]), 'Genel-Gider');

  // Sheet 8: M√Љ≈Яteri Giderleri
  const cgH = ['Dosya No','M√Љ≈Яteri','Tutar','A√Іƒ±klama','Kaydeden','Tarih'];
  const cgR = custExpList.map(function(e){
    const c=customers.find(function(x){return x.id===e.customer_file_number;});
    return [e.customer_file_number,c?c.name:'вАФ',Number(e.amount),e.description||'',e.created_by||'',e.created_at?e.created_at.slice(0,10):''];
  });
  XLSX.utils.book_append_sheet(wb, XLSX.utils.aoa_to_sheet([cgH,...cgR]), 'Musteri-Giderleri');

  XLSX.writeFile(wb,`VizeCRM-Muhasebe-${period.replace(/ /g,'_')}-${new Date().toISOString().slice(0,10)}.xlsx`);
  toast('вЬУ Tam rapor indirildi (8 sekme)','green');
}

async function loadFiles(customerId){
  const listEl=document.getElementById('file-list-'+customerId);
  const countEl=document.getElementById('file-count-'+customerId);
  if(!listEl)return;
  try{
    const res=await fetch(EDGE_FUNCTION_URL,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({action:'getFiles',customerId,token:CU.token})});

    if(files.length===0){
      listEl.innerHTML='<div style="font-size:12px;color:var(--text3)">Hen√Љz dosya y√Љklenmedi.</div>';
      return;
    }
    function fmtSize(b){if(b<1024)return b+'B';if(b<1048576)return (b/1024).toFixed(1)+'KB';return (b/1048576).toFixed(1)+'MB';}
    function fmtFileName(n){const parts=n.split('_');return parts.length>1?parts.slice(1).join('_'):n;}
    const canDelete=CU.role==='management'||CU.role==='evrak'||CU.role==='randevu'||(CU.role==='sales');
    listEl.innerHTML=files.map(f=>`
      <div style="display:flex;align-items:center;justify-content:space-between;padding:8px 10px;background:var(--surface2);border-radius:7px;border:1px solid var(--border);gap:8px">

        </div>
        <div style="display:flex;gap:6px;flex-shrink:0">
          <a href="${f.url}" target="_blank" class="btn btn-ghost btn-sm" style="text-decoration:none">вђЗ ƒ∞ndir</a>
          ${canDelete?`<button class="btn btn-danger btn-sm" onclick="deleteFile('${customerId}','${f.name}')">вЬХ</button>`:''}
        </div>
      </div>`).join('');
  }catch(e){
    if(listEl)listEl.innerHTML='<div style="font-size:12px;color:var(--text3)">Dosyalar y√Љklenemedi.</div>';
  }
}

async function uploadFile(customerId, input){
  const file=input.files[0];
  if(!file)return;
  if(file.size>15*1024*1024){toast('Dosya 15MB\'dan b√Љy√Љk olamaz','red');input.value='';return;}
  const btn=input.parentElement?.querySelector('button');
  if(btn){btn.disabled=true;btn.textContent='Y√Љkleniyor...';}
  try{
    const reader=new FileReader();
    reader.onload=async(e)=>{
      const base64=e.target.result;
      const res=await fetch(EDGE_FUNCTION_URL,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({action:'uploadFile',customerId,fileName:file.name,fileData:base64,fileType:file.type,token:CU.token})});
      const d=await res.json();
      if(!d.success){toast('Y√Љkleme hatasƒ±','red');}
      else{toast('вЬУ Dosya y√Љklendi','green');loadFiles(customerId);}
      if(btn){btn.disabled=false;btn.textContent='рЯУО Dosya Se√І ve Y√Љkle';}
      input.value='';
    };
    reader.readAsDataURL(file);
  }catch(e){
    toast('BaƒЯlantƒ± hatasƒ±','red');
    if(btn){btn.disabled=false;btn.textContent='рЯУО Dosya Se√І ve Y√Љkle';}
  }
}

async function exportExcel(){
  if(CU.role!=='management'){toast('Bu i≈Яlem i√Іin yetkiniz yok','red');return;}
  const list=getTableData();
  if(!list||list.length===0){toast('Dƒ±≈Яa aktarƒ±lacak m√Љ≈Яteri yok','red');return;}
  toast('вП≥ Excel hazƒ±rlanƒ±yor...','blue');
  try{
    // Her m√Љ≈Яteri i√Іin detay √Іek
    const details={};
    await Promise.all(list.map(async c=>{
      try{
        const res=await fetch(EDGE_FUNCTION_URL,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({action:'getCustomerDetail',customerId:c.id,token:CU.token})});
        const d=await res.json();
        details[c.id]=d;
      }catch(e){details[c.id]={};}
    }));

    const headers=[
      'Dosya No','Ad Soyad','Telefon','E-posta',
      '√Ьlke','Vize T√Љr√Љ','A≈Яama',
      'Satƒ±≈Я Temsilcisi','Evrak Sorumlusu','Randevu Sorumlusu',
      'Toplam √Ьcret (вВЇ)','√Цn √Цdeme (вВЇ)','Kalan √Цdeme (вВЇ)','√Цdeme Durumu',
      'Randevu Tarihi','Randevu Saati','Randevu Merkezi',
      'ƒ∞ade Durumu','ƒ∞ade Tutarƒ± (вВЇ)','ƒ∞ade Nedeni',
      'Refakat√Іi Sayƒ±sƒ±','Refakat√Іiler',
      'Not Sayƒ±sƒ±','Son Not',
      'Arama Sayƒ±sƒ±','Ula≈Яƒ±lan Arama',
      'Belge Sayƒ±sƒ±','Tamamlanan Belge',
      'Kayƒ±t Tarihi','Son G√Љncelleme','Kaynak'
    ];

    const rows=list.map(c=>{
      const d=details[c.id]||{};
      const notes=d.notes||[];
      const calls=d.calls||[];
      const docs=d.documents||[];
      const companions=d.companions||[];
      const rem=(c.fee||0)-(c.prepay||0);
      const paidFull=c.fee>0&&rem<=0;
      const completedDocs=docs.filter(x=>x.status==='Onaylandƒ±').length;
      const reachedCalls=calls.filter(x=>x.result==='ulasildi').length;
      const companionList=companions.map(cp=>cp.name+(cp.relationship?'('+cp.relationship+')':'')).join(', ');
      const lastNote=notes.length>0?notes[0].text?.replace(/\n/g,' '):'';
      return [
        c.id,
        c.name,
        c.phone,
        c.email||'',
        c.country,
        c.visa,
        c.status,
        c.rep||'вАФ',
        c.evrakRep||'вАФ',
        c.randevuRep||'вАФ',
        c.fee||0,
        c.prepay||0,
        rem>0?rem:0,
        paidFull?'Tahsil Edildi':'Bekliyor',
        c.apptDate||'',
        c.apptTime||'',
        c.apptCenter||'',
        c.refundStatus||'Yok',
        c.refundAmount||0,
        c.refundReason||'',
        companions.length,
        companionList,
        notes.length,
        lastNote,
        calls.length,
        reachedCalls,
        docs.length,
        completedDocs,
        c.created||'',
        c.lastMod||'',
        c.source==='google_forms'?'Google Form':'Manuel'
      ];
    });

    const data=[headers,...rows];
    const ws=XLSX.utils.aoa_to_sheet(data);

    // Kolon geni≈Яlikleri
    ws['!cols']=[
      {wch:16},{wch:22},{wch:14},{wch:25},
      {wch:14},{wch:18},{wch:22},
      {wch:18},{wch:18},{wch:18},
      {wch:14},{wch:14},{wch:14},{wch:14},
      {wch:14},{wch:12},{wch:14},
      {wch:14},{wch:14},{wch:20},
      {wch:12},{wch:30},
      {wch:10},{wch:40},
      {wch:12},{wch:14},
      {wch:12},{wch:16},
      {wch:18},{wch:18},{wch:12}
    ];

    const wb=XLSX.utils.book_new();
    XLSX.utils.book_append_sheet(wb,ws,'M√Љ≈Яteriler');
    XLSX.writeFile(wb,`vizecrm-detayli-${new Date().toISOString().slice(0,10)}.xlsx`);
    toast('вЬУ Detaylƒ± Excel indirildi ('+list.length+' m√Љ≈Яteri)','green');
  }catch(e){
    toast('Excel olu≈Яturulurken hata olu≈Яtu','red');
  }
}

// Ba≈Яvuru Yapƒ±ldƒ± durumuna ge√Іmeden √ґnce bekleyen randevu kontrol√Љ
function checkPendingApplications(custId, newStatus, applications) {
  if (newStatus !== 'Ba≈Яvuru Yapƒ±ldƒ±') return true;
  const pending = applications.filter(ap => ap.status !== 'Tamamlandƒ±' && ap.appt_date);
  if (pending.length === 0) return true;
  const names = pending.map(ap => {
    const nm = ap.applicant_name || 'Ana ba≈Яvuru';
    const dt = ap.appt_date ? fmtDate(ap.appt_date) : '';
    return nm + (dt ? ' вАФ ' + dt : '');
  }).join('\n');
  return confirm(
    'вЪ†пЄП Dƒ∞KKAT!\n\nHen√Љz ba≈Яvurusu yapƒ±lmamƒ±≈Я randevu(lar) var:\n\n' + names +
    '\n\nYine de "Ba≈Яvuru Yapƒ±ldƒ±" olarak i≈Яaretlemek istiyor musunuz?'
  );
}

async function collectKalan(id, totalFee){
  const inp = document.getElementById('ed-kalan-'+id);

  const paymentDate = document.getElementById('ed-kalan-date-'+id)?.value || '';
  const cust = customers.find(c=>c.id===id);
  const newPrepay = (cust?.prepay||0) + amount;
  const fee = parseFloat(document.getElementById('ed-fee-'+id)?.value) || totalFee;
  try {
    const res = await fetch(EDGE_FUNCTION_URL,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({action:'updatePayment',customerId:id,fee,prepay:newPrepay,paymentDateOverride:paymentDate||null,token:CU.token})});
    const d = await res.json();
    if(!d.success){toast('Hata: '+JSON.stringify(d.error||''),'red');return;}
    await loadCustomers();
    await loadAllPayments();

    if(document.getElementById('cust-tbody'))renderRows();
    const dateLabel = paymentDate ? fmtDate(paymentDate) : 'bug√Љn';
    toast('вЬУ '+fmtTL(amount)+' tahsil edildi вАФ '+dateLabel+' tarihi ile kaydedildi','green');
    if(document.getElementById('cust-tbody'))renderRows();
    if(document.getElementById('kanban'))renderPipeline();
  } catch(e){ toast('BaƒЯlantƒ± hatasƒ±','red'); }
}

    const d=await res.json();

    if(CU.role==='sales'||CU.role==='evrak'||CU.role==='randevu'){
      repSelect.innerHTML=`<option value="${CU.username}">${CU.name} (Ben)</option>`;
      repSelect.disabled=true;
    } else {
      repSelect.disabled=false;
      repSelect.innerHTML=salesReps.map(u=>`<option value="${u.username}">${u.name}</option>`).join('');
    }
  }catch(e){}
  document.getElementById('add-modal').classList.add('open');
}
function closeModal(){
  document.getElementById('add-modal').classList.remove('open');
  const btn=document.querySelector('#add-modal .btn-primary');
  if(btn){btn.disabled=false;btn.textContent='вЬУ M√Љ≈Яteriyi Kaydet';}
  addingCustomer=false;
}

async function addCustomer(){
  if(addingCustomer)return;
  addingCustomer=true;
  const name=document.getElementById('nm-name').value.trim(),phone=document.getElementById('nm-phone').value.trim();
  const email=document.getElementById('nm-email').value.trim();
  if(!name||!phone||!email){toast('Ad, telefon ve e-posta zorunludur','red');addingCustomer=false;return;}
  const fee=parseInt(document.getElementById('nm-fee').value)||0,pre=parseInt(document.getElementById('nm-pre').value)||0;
  const country=document.getElementById('nm-country').value;
  const visa_type=document.getElementById('nm-visa').value;
  const assignTo=document.getElementById('nm-rep').value;
  if(!assignTo){toast('L√Љtfen bir satƒ±≈Я temsilcisi se√Іin','red');addingCustomer=false;return;}
  const btn=document.querySelector('#add-modal .btn-primary');
  if(btn){btn.disabled=true;btn.textContent='Kaydediliyor...';}
  const regDate=document.getElementById('nm-reg-date')?.value||'';
  const payload=JSON.stringify({action:'addCustomer',name,phone,email,country,visa_type,fee,prepay:pre,assignTo,registrationDate:regDate||null,token:CU.token});
  let res=null;
  try{
    res=await fetch(EDGE_FUNCTION_URL,{method:'POST',headers:{'Content-Type':'application/json'},body:payload});
  }catch(e){
    // ƒ∞lk denemede baƒЯlantƒ± hatasƒ± вАФ 1.5 saniye bekleyip tekrar dene (cold start)
    if(btn)btn.textContent='Tekrar deneniyor...';
    await new Promise(r=>setTimeout(r,1500));
    try{
      res=await fetch(EDGE_FUNCTION_URL,{method:'POST',headers:{'Content-Type':'application/json'},body:payload});
    }catch(e2){
      toast('BaƒЯlantƒ± hatasƒ± вАФ internet baƒЯlantƒ±nƒ±zƒ± kontrol edin','red');
      if(btn){btn.disabled=false;btn.textContent='вЬУ M√Љ≈Яteriyi Kaydet';}
      addingCustomer=false;return;
    }
  }
  try{
    const d=await res.json();
    if(!d.success){toast('Hata: '+JSON.stringify(d.error||'Eklenemedi'),'red');if(btn){btn.disabled=false;btn.textContent='вЬУ M√Љ≈Яteriyi Kaydet';}addingCustomer=false;return;}
    if(d.duplicate){toast('вЪ†пЄП Bu telefon numarasƒ± az √ґnce kaydedildi ('+d.id+')','amber');closeModal();addingCustomer=false;loadCustomers().then(()=>{if(document.getElementById('cust-tbody'))renderRows();});return;}
    closeModal();
    toast('вЬУ '+name+' eklendi вАФ '+d.id+' ('+d.assignedTo+'\'a atandƒ±)','green');
    ['nm-name','nm-phone','nm-email','nm-fee','nm-pre','nm-rem'].forEach(i=>{const el=document.getElementById(i);if(el)el.value='';});
    loadCustomers().then(()=>{if(document.getElementById('cust-tbody'))renderRows();if(document.getElementById('kanban'))renderPipeline();});
  }catch(e){
    toast('Sunucu yanƒ±t hatasƒ± вАФ l√Љtfen tekrar deneyin','red');
    if(btn){btn.disabled=false;btn.textContent='вЬУ M√Љ≈Яteriyi Kaydet';}
  }finally{
    addingCustomer=false;
  }
}
